name: Continuous Integration & Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME || 'movie-review-finder' }}
  GAR_LOCATION: ${{ secrets.GCP_GAR_LOCATION || 'us-central1' }}
  REPOSITORY: ${{ secrets.GCP_GAR_REPOSITORY || 'app-images' }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

jobs:
  test-and-lint:
    name: Test & Lint Codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter & Type Check
        run: npm run lint

      - name: Run Automation Tests (Vitest)
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Automation Tests (Playwright)
        run: npm run test:e2e

  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Google Cloud Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Authentication Step ---
      # Option A: Workload Identity Federation (Recommended & Secure)
      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      # Option B: Fallback to Service Account JSON Key (Traditional)
      - name: Authenticate to Google Cloud (SA Key)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && env.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Configure Docker to use Google Artifact Registry credentials
      - name: Docker Auth
        if: ${{ env.PROJECT_ID != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # Fallback Docker Auth for Workload Identity
      - name: Docker Auth (OIDC)
        if: ${{ env.PROJECT_ID != '' && env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Set up Docker Buildx for optimization
      - name: Set up Docker Buildx
        if: ${{ env.PROJECT_ID != '' }}
        uses: docker/setup-buildx-action@v3

      # Build & Push container image to Google Artifact Registry
      - name: Build and Push Container
        if: ${{ env.PROJECT_ID != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy the image to Google Cloud Run
      - name: Deploy to Cloud Run
        if: ${{ env.PROJECT_ID != '' }}
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'

      # Print the live service URL
      - name: Show Service URL
        if: ${{ env.PROJECT_ID != '' }}
        run: |
          echo "Your application has been deployed successfully!"
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
